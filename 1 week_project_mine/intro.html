<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>introduve page</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://kit.fontawesome.com/d909371b59.js" crossorigin="anonymous"></script>
</head>
<body>
    <!-- welcome -->
<section class="welcome">
    <h3>반갑습니다!</h3>
    <h4>개발자로 첫 걸음을 내딛게 된 유동헌입니다.</h4>
</section>

    <!-- main up--left, light -->
<section class="upperSide">
    <div class="upperSide__left">
        <div class="icon">
            <i class="fas fa-code"></i>   
        </div>

        <div class="title">
            <h4>개발자 지망</h4>
        </div>

        <div class="description">
            <h5>백엔드 개발자 희망</h5>
        </div>
    </div>

    <div class="upperSide__right">
        <div class="icon">
            <i class="fas fa-book"></i>
        </div>

        <div class="title">
            <h4>Bricks Education</h4>
        </div>

        <div class="description">
            <h5>5년 동안 마케팅 업무를 담당하였습니다</h5>
        </div>
    </div>  
</section>

    <!-- main down--left, light -->

<section class="downSide">

    <div class="downSide__left">
        <div class="icon">
            <i class="fas fa-hands-helping"></i>   
        </div>
    
        <div class=title">
            <h4>협력</h4>
            <h4>책임감</h4>
        </div>
    
        <div class=description">
            <h5></h5>
        </div>
    </div>
    
    <div class="downSide__right">
        <div class="icon">
            <i class="fas fa-id-card-alt"></i>
        </div>
    
        <div class="title">
            <h4>Contact Me</h4>
        </div>
    
        <div class="description">
            <i class="fab fa-github"></i>
            <i class="fab fa-slack"></i>
            <i class="fab fa-blogger"></i>
        </div>
    </div>  
</section>
</body>
</html>
